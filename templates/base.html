<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mood Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-mood="{{ latest_mood | default('happy') }}">
  <header class="site-header">
    <a href="{{ url_for('index') }}" class="logo">
      <span class="logo-emoji">🌈</span>
      <span class="logo-text">Mood Tracker</span>
    </a>
    <nav class="site-nav">
      <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
      </a>
      <a href="{{ url_for('history_page') }}" class="nav-link {% if request.endpoint == 'history_page' %}active{% endif %}">
        <span class="nav-icon">📜</span>
        <span>My Quotes</span>
      </a>
    </nav>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Made with 💖 — track your feelings!</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
